<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Team Effectiveness Instrument · Civic Power Lab</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Archivo+Narrow:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  :root {
    /* Groundwork / Linear-aesthetic palette */
    --paper: #ffffff;
    --paper-tint: #fafafa;
    --cream-2: #f4f4f5;
    --rule: #e4e4e7;
    --rule-soft: #f0f0f3;
    --ink: #18181b;
    --ink-2: #27272a;
    --mute: #71717a;
    /* Brand purple replaces cobalt */
    --cobalt: #5c7dfa;
    --cobalt-deep: #3e4f6e;
    --cobalt-soft: #c5d0fc;
    --terracotta: #b7432b;
    --terracotta-soft: #f4d3cb;
    --olive: #5b7a3a;
    --amber: #c99633;
    --slate: #475569;
    --teal: #0e8a78;
    /* Growth-framed signals (purple = thriving, marigold = developing, grey = opportunity for growth).
       No green/yellow/red because "red team" carries social weight that distorts how organizers
       respond to weak teams (struggling teams often need more attention, not less). Marigold
       gives the middle tier its own warm hue so purple/middle/grey read as three categorical
       states, not a gradient. */
    --signal-green: #5c7dfa;            /* legacy var name, now brand purple */
    --signal-green-soft: rgba(92,125,250,0.14);
    --signal-yellow: #f59e0b;           /* legacy var name, now marigold/amber */
    --signal-yellow-soft: rgba(245,158,11,0.14);
    --signal-red: #71717a;              /* legacy var name, now neutral grey */
    --signal-red-soft: rgba(113,113,122,0.14);
    --display: "Archivo Narrow", -apple-system, system-ui, sans-serif;
    --sans: "DM Sans", -apple-system, system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
    /* Legacy alias so existing rules using var(--serif) still work, falls back to display */
    --serif: var(--display);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--sans);
    font-weight: 400;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ===== App shell ===== */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
  }
  .wordmark {
    font-family: var(--display); font-size: 22px; font-weight: 700;
    letter-spacing: -0.01em; color: var(--ink); line-height: 1.1;
  }
  .wordmark .dot { color: var(--cobalt); margin: 0 6px; }
  .title-block { display: flex; flex-direction: column; gap: 4px; }
  .app-title {
    font-family: var(--display); font-size: 22px; font-weight: 700;
    color: var(--ink); margin: 0; letter-spacing: -0.01em;
    cursor: pointer; user-select: none;
    transition: color 0.12s; line-height: 1.1;
  }
  .app-title:hover { color: var(--cobalt); }
  .app-title .accent { color: var(--cobalt); }
  .app-title-sub {
    font-family: var(--sans); font-size: 13px; color: var(--mute);
    font-weight: 400; letter-spacing: 0; text-transform: none;
    margin-left: 0;
  }
  .badge {
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: var(--cream-2); color: var(--ink-2);
    border: 1px solid var(--rule);
    padding: 4px 8px; border-radius: 4px;
  }
  .badge-crm {
    font-family: var(--mono); font-size: 9px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: var(--teal); color: var(--paper);
    padding: 2px 5px; border-radius: 3px;
    vertical-align: middle;
  }
  .badge-dev {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--sans); font-size: 11px; font-weight: 500;
    letter-spacing: 0; text-transform: none;
    background: rgba(92,125,250,0.1); color: var(--cobalt);
    border: 1px solid var(--cobalt-soft);
    padding: 3px 8px; border-radius: 999px;
    margin-top: 6px;
  }
  .badge-dev::before {
    content: ""; display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--cobalt);
  }
  .badge-self {
    font-family: var(--mono); font-size: 9px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: transparent; color: var(--mute);
    border: 1px solid var(--rule);
    padding: 1px 5px; border-radius: 2px;
    vertical-align: middle;
  }
  .top-actions { display: flex; gap: 8px; }

  /* ===== Layout ===== */
  .pane-wrap { flex: 1; display: grid; grid-template-columns: minmax(460px, 540px) 1fr; min-height: 0; }
  .left-pane { border-right: 1px solid var(--rule); overflow-y: auto; background: var(--paper-tint); }
  .right-pane { position: relative; overflow: hidden; background: var(--paper); }

  /* ===== Sections ===== */
  .section { border-bottom: 1px solid var(--rule-soft); }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; cursor: pointer; user-select: none;
  }
  .section-header h2 {
    margin: 0;
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--cobalt);
  }
  .section-header .caret { font-family: var(--mono); font-size: 11px; color: var(--mute); }
  .section-body { padding: 0 20px 20px; }
  .section-body p.intro {
    font-family: var(--serif); font-size: 13px; line-height: 1.55; color: var(--ink-2);
    margin: 0 0 14px;
  }

  /* ===== Form ===== */
  .field { margin-bottom: 12px; }
  .field label {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 9.5px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--mute);
    margin-bottom: 4px;
  }
  .field label .lbl-text { flex: 1; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 7px 9px;
    background: var(--paper);
    border: 1px solid var(--rule);
    font-family: var(--sans); font-size: 13px; color: var(--ink);
    border-radius: 2px;
    transition: border-color 0.15s;
  }
  /* CRM-prefilled fields: brand-purple highlight (replaces the earlier teal/green) */
  .field input.crm-filled, .field select.crm-filled, .field textarea.crm-filled {
    background: rgba(92,125,250,0.06);
    border-color: var(--cobalt-soft);
  }
  .field textarea { resize: vertical; min-height: 50px; font-family: var(--sans); }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--cobalt);
    box-shadow: 0 0 0 1px var(--cobalt);
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* Subsection within form */
  .form-subsection {
    border: 1px solid var(--rule-soft);
    background: var(--paper);
    border-radius: 2px;
    padding: 12px 14px 4px;
    margin-bottom: 14px;
  }
  .form-subsection-title {
    font-family: var(--mono); font-size: 9.5px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--cobalt);
    margin: 0 0 4px;
  }
  .form-subsection-sub {
    font-family: var(--serif); font-style: italic; font-size: 12px;
    color: var(--mute);
    margin: 0 0 12px;
  }

  /* Likert */
  .likert {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;
  }
  .likert button {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    padding: 7px 0;
    background: var(--paper); color: var(--ink-2);
    border: 1px solid var(--rule); border-radius: 2px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .likert button:hover { border-color: var(--cobalt-soft); }
  .likert button.selected {
    background: var(--cobalt); color: var(--paper); border-color: var(--cobalt);
    box-shadow: 0 0 0 1px var(--cobalt);
  }
  .likert-scale {
    display: flex; justify-content: space-between;
    font-family: var(--mono); font-size: 9px;
    color: var(--mute); letter-spacing: 0.08em;
    margin-top: 3px; text-transform: uppercase;
  }

  /* Yes/No toggle */
  .yn {
    display: inline-flex; gap: 0;
    border: 1px solid var(--rule); border-radius: 2px; overflow: hidden;
  }
  .yn button {
    background: var(--paper); color: var(--ink-2);
    border: none;
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 6px 14px;
    cursor: pointer;
  }
  .yn button + button { border-left: 1px solid var(--rule); }
  .yn button.selected.yes { background: var(--cobalt); color: var(--paper); }
  .yn button.selected.no { background: var(--terracotta); color: var(--paper); }

  /* Check group — same pattern as Faces of Power in power-mapping demo */
  .check-group { display: flex; flex-direction: column; gap: 4px; }
  .check-row-wrap { display: flex; flex-direction: column; }
  .check-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border: 1px solid var(--rule); border-radius: 4px;
    background: var(--paper);
    transition: background 0.12s, border-color 0.12s;
    user-select: none;
  }
  .check-row.selected { background: rgba(92,125,250,0.08); border-color: var(--cobalt); }
  .check-row .check-toggle {
    flex: 1;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; min-width: 0;
  }
  .check-row .check-box {
    width: 16px; height: 16px; flex-shrink: 0;
    border: 1.5px solid var(--rule); border-radius: 3px;
    background: var(--paper);
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.12s, border-color 0.12s;
  }
  .check-row.selected .check-box {
    background: var(--cobalt); border-color: var(--cobalt);
  }
  .check-row .check-box::after {
    content: ""; opacity: 0;
    width: 9px; height: 5px;
    border-left: 2px solid var(--paper);
    border-bottom: 2px solid var(--paper);
    transform: rotate(-45deg) translate(1px, -1px);
    transition: opacity 0.12s;
  }
  .check-row.selected .check-box::after { opacity: 1; }
  .check-row .check-label {
    flex: 1;
    font-family: var(--sans); font-weight: 500; font-size: 13px; color: var(--ink);
    line-height: 1.35; letter-spacing: 0;
    transition: color 0.12s;
  }
  .check-row .check-toggle:hover .check-label { color: var(--cobalt); }
  .check-info-btn {
    flex-shrink: 0;
    width: 20px; height: 20px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: var(--cobalt); color: var(--paper);
    font-family: var(--display); font-size: 12px; font-weight: 700;
    border: none; cursor: pointer; padding: 0;
    transition: background 0.12s, transform 0.12s;
  }
  .check-info-btn:hover { background: var(--cobalt-deep); }
  .check-info-btn.open { background: var(--ink); transform: rotate(45deg); }
  .check-desc {
    margin-top: 8px; padding: 10px 12px;
    background: var(--paper-tint);
    border: 1px solid var(--rule); border-radius: 4px;
    font-family: var(--sans); font-size: 12.5px; line-height: 1.55;
    color: var(--ink-2);
  }

  /* Buttons */
  .btn {
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    padding: 7px 14px; border-radius: 2px; cursor: pointer; border: 1px solid;
    transition: background 0.15s, color 0.15s;
  }
  .btn-primary { background: var(--cobalt); color: var(--paper); border-color: var(--cobalt); }
  .btn-primary:hover { background: var(--cobalt-deep); border-color: var(--cobalt-deep); }
  .btn-ghost { background: transparent; color: var(--cobalt); border-color: var(--rule); }
  .btn-ghost:hover { background: var(--cream-2); border-color: var(--cobalt); }
  .btn-danger { background: transparent; color: var(--terracotta); border-color: var(--terracotta); }
  .btn-danger:hover { background: var(--terracotta); color: var(--paper); }

  .btn-row { display: flex; gap: 8px; margin-top: 14px; }

  /* ===== Team list ===== */
  .team-list { display: flex; flex-direction: column; gap: 8px; }
  .team-card {
    border: 1px solid var(--rule);
    background: var(--paper);
    border-radius: 2px;
    padding: 11px 13px;
    transition: border-color 0.15s;
  }
  .team-card:hover { border-color: var(--cobalt-soft); }
  .team-card.editing { border-color: var(--cobalt); }
  .team-card-head {
    display: flex; align-items: flex-start; gap: 10px;
  }
  .team-color-chip {
    width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.15);
  }
  .team-summary { flex: 1; min-width: 0; }
  .team-name {
    font-family: var(--serif); font-size: 14px; font-weight: 500;
    color: var(--ink); line-height: 1.2;
  }
  .team-meta {
    font-family: var(--sans); font-size: 11.5px; color: var(--mute);
    margin-top: 2px;
  }
  .team-scoreline {
    font-family: var(--mono); font-size: 9.5px; font-weight: 500;
    color: var(--cobalt); letter-spacing: 0.1em;
    margin-top: 4px;
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .team-scoreline .lbl { color: var(--mute); }
  .team-actions { display: flex; gap: 6px; }
  .icon-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--mute); font-family: var(--mono); font-size: 10px;
    padding: 2px 4px; letter-spacing: 0.1em;
  }
  .icon-btn:hover { color: var(--cobalt); }
  .icon-btn.delete:hover { color: var(--terracotta); }
  .team-edit-body { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--rule); }

  /* ===== Tabs ===== */
  .tabs {
    position: absolute; top: 0; left: 0; right: 0; z-index: 3;
    display: flex; gap: 0;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    padding: 0 20px;
  }
  .tab {
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--mute);
    padding: 14px 18px;
    background: transparent; border: none; cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--ink-2); }
  .tab.active { color: var(--cobalt); border-bottom-color: var(--cobalt); }
  .view-host {
    position: absolute; top: 41px; left: 0; right: 0; bottom: 0;
    overflow-y: auto;
    padding: 30px;
  }

  /* ===== Scorecard view ===== */
  .scorecard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 18px;
  }
  .score-card {
    border: 1px solid var(--rule);
    background: var(--paper-tint);
    border-radius: 2px;
    padding: 16px 18px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .score-card-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 10px;
  }
  .score-card-title {
    font-family: var(--serif); font-size: 16px; font-weight: 500;
    color: var(--ink); line-height: 1.2;
  }
  .score-card-meta {
    font-family: var(--sans); font-size: 11.5px; color: var(--mute);
    margin-top: 2px;
  }
  .health-index {
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--display); font-size: 22px; font-weight: 700;
    line-height: 1; padding: 7px 12px;
    border-radius: 8px;
    min-width: 48px; text-align: center;
    border: 1px solid transparent;
  }
  .health-index.green  { color: #3e4f8e; background: var(--signal-green-soft);  border-color: rgba(92,125,250,0.40); }
  .health-index.yellow { color: #92400e; background: var(--signal-yellow-soft); border-color: rgba(245,158,11,0.40); }
  .health-index.red    { color: #52525b; background: var(--signal-red-soft);    border-color: rgba(113,113,122,0.40); }
  .health-index-lbl {
    font-family: var(--sans); font-size: 11px; font-weight: 500;
    letter-spacing: 0; text-transform: none;
    color: var(--mute);
    margin-top: 2px;
  }
  /* GitHub-style contribution grid */
  .contrib-grid {
    display: grid;
    grid-template-columns: repeat(7, 12px);
    grid-auto-rows: 12px;
    gap: 3px;
  }
  .contrib-cell {
    width: 12px; height: 12px;
    background: var(--cream-2);
    border-radius: 2px;
    border: 1px solid rgba(0,0,0,0.04);
  }
  .contrib-cell.green  { background: var(--signal-green); }
  .contrib-cell.yellow { background: var(--signal-yellow); }
  .contrib-cell.red    { background: var(--signal-red); }
  .contrib-cell.dim    { background: rgba(74,124,58,0.18); }
  .contrib-row-label {
    font-family: var(--mono); font-size: 8.5px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--mute);
    line-height: 14px;
  }
  .contrib-wrap {
    display: grid; grid-template-columns: 24px auto; gap: 8px; align-items: center;
  }
  .contrib-rows { display: flex; flex-direction: column; gap: 3px; }
  .contrib-row {
    display: grid; grid-template-columns: 30px repeat(7, 12px) 30px;
    gap: 4px; align-items: center;
  }
  .contrib-row .contrib-row-num {
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    color: var(--ink-2); text-align: right;
  }
  .score-radar { display: flex; justify-content: center; }
  .score-bars { display: flex; flex-direction: column; gap: 7px; }
  .score-bar-row {
    display: grid; grid-template-columns: 110px 1fr 38px;
    gap: 8px; align-items: center;
  }
  .score-bar-lbl {
    font-family: var(--mono); font-size: 9.5px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-2);
  }
  .score-bar-track {
    height: 8px; background: var(--cream-2);
    border-radius: 1px; overflow: hidden;
  }
  .score-bar-fill { height: 100%; background: var(--signal-green); }
  .score-bar-fill.yellow { background: var(--signal-yellow); }
  .score-bar-fill.red    { background: var(--signal-red); }
  .score-bar-num {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    color: var(--ink-2); text-align: right;
  }
  .score-bar-num.green  { color: var(--signal-green); }
  .score-bar-num.yellow { color: var(--signal-yellow); }
  .score-bar-num.red    { color: var(--signal-red); }
  .score-tags {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-top: 2px;
  }
  .score-tag {
    font-family: var(--mono); font-size: 9px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 2px;
    border: 1px solid var(--rule); color: var(--mute);
    background: var(--paper);
  }
  .score-tag.flag { color: var(--terracotta); border-color: var(--terracotta-soft); }
  .score-tag.ok { color: var(--olive); border-color: var(--olive); }
  .sortbar {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--mute);
    margin-bottom: 18px;
  }
  .sortbar select {
    font-family: var(--mono); font-size: 10px;
    background: var(--paper); border: 1px solid var(--rule);
    padding: 4px 6px; border-radius: 2px;
    color: var(--ink);
  }

  /* ===== Effectiveness grid (2x2) ===== */
  .grid-stage {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    padding: 30px;
  }
  .grid-svg { max-width: 100%; max-height: 100%; cursor: default; }
  /* Quadrant labels rendered as small HTML badges absolutely positioned over the SVG,
     so they stay readable above data dots without ink-overlap. */
  .quad-badge {
    position: absolute; z-index: 2;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 9px;
    background: rgba(255,255,255,0.95);
    border: 1px solid var(--rule); border-radius: 999px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    font-family: var(--sans); font-size: 11.5px; font-weight: 500;
    color: var(--ink-2); letter-spacing: 0;
    pointer-events: none; white-space: nowrap;
  }
  .quad-badge .quad-num {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    color: var(--cobalt); letter-spacing: 0.06em;
  }
  .grid-axis-label {
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; fill: var(--cobalt);

/* ========= Scoring ========= */

/* Each dimension scored 0..1, then x100 for display. */

function scoreRightPeople(t) {
  /* CRM facts */
  const coreLeaderScore = Math.min(t.coreLeaders / 5, 1) * 30; // 5+ core leaders = full

  /* Core-leader practice (was a check-list, now 1-5 likerts). Average across
     items, normalize to 0-1, scale to 40 points. */
  const corePracticeAvg = RIGHT_PEOPLE_CORE_LIKERTS.length === 0 ? 0
    : RIGHT_PEOPLE_CORE_LIKERTS.reduce((s, c) => s + ((t[c.key] || 1) - 1) / 4, 0) / RIGHT_PEOPLE_CORE_LIKERTS.length;
  const corePracticeScore = corePracticeAvg * 40;

  /* Three likerts: political-change + consequential-decisions + belonging.
     Average across them, scale to 30. */
  const likertAvg = RIGHT_PEOPLE_LIKERTS.length === 0 ? 0
    : RIGHT_PEOPLE_LIKERTS.reduce((s, l) => s + ((t[l.key] || 1) - 1) / 4, 0) / RIGHT_PEOPLE_LIKERTS.length;
  const likertScore = likertAvg * 30;

  return Math.round(coreLeaderScore + corePracticeScore + likertScore);
}

function scoreRealTeam(t) {
  /* CRM facts */
  const bounded = t.boundedMembership ? 12 : 0;
  const monthly = t.meetsMonthly ? 12 : 0;
  const stable  = t.stableFullCycle ? 12 : 0;
  /* "% of folks who attended more than 50% of events" (Obama-derived 75% bar) */
  const att = t.attendancePct >= 75 ? 20
            : t.attendancePct >= 60 ? 12
            : t.attendancePct >= 40 ? 6
            : 0;
  /* Self-report likerts: co-owned agendas + consequential decisions + accountable to constituency */
  const realTeamLikertAvg = REAL_TEAM_LIKERTS.length === 0 ? 0
    : REAL_TEAM_LIKERTS.reduce((s, l) => s + ((t[l.key] || 1) - 1) / 4, 0) / REAL_TEAM_LIKERTS.length;
  const realTeamLikertScore = realTeamLikertAvg * 44;  // takes up the remaining share
  return Math.round(bounded + monthly + stable + att + realTeamLikertScore);
}

function scorePurpose(t) {
  const po = (((t.powerOrientation || 1) - 1) / 4) * 25;
  const mc = (((t.missionClarity || 1) - 1) / 4) * 20;
  const sp = (((t.strategyPlace || 1) - 1) / 4) * 20;
  const plan = t.mediumTermPlan ? 15 : 0;
  const play = t.powerPlay ? 15 : 0;
  const fed  = t.fedRepresented ? 5 : 0;
  return Math.round(po + mc + sp + plan + play + fed);
}

function scoreTeam(t) {
  const rp = scoreRightPeople(t);
  const rt = scoreRealTeam(t);
  const cp = scorePurpose(t);
  /* Health index = equal-weighted blend, clamped */
  const hi = Math.round((rp + rt + cp) / 3);
  return { rp, rt, cp, hi };
}

/* Default grid position derived from sub-scores. x = distributed leadership
   (avg of Right People + co-agendas), y = strategic clarity (Compelling Purpose).
   Range -1..1 each. */
function defaultGridPos(t) {
  const { rp, cp } = scoreTeam(t);
  const xRaw = (rp + ((t.coAgendas || 1) - 1) / 4 * 100) / 2; // 0..100
  const yRaw = cp; // 0..100
  return {
    x: Math.max(-1, Math.min(1, (xRaw - 50) / 50)),
    y: Math.max(-1, Math.min(1, (yRaw - 50) / 50)),
  };
}

function effectiveGridPos(t) {
  if (t.gridX !== 0 || t.gridY !== 0) return { x: t.gridX, y: t.gridY };
  return defaultGridPos(t);
}

function teamQuadrant(t) {
  const { x, y } = effectiveGridPos(t);
  if (x >= 0 && y >= 0) return QUADRANTS[0]; // upper-right: Effective
  if (x < 0  && y >= 0) return QUADRANTS[1]; // upper-left: Develop core leaders
  if (x >= 0 && y < 0)  return QUADRANTS[2]; // lower-right: Coach into strategy
  return QUADRANTS[3];                       // lower-left: Restart / rebuild
}

/* Signal colors based on score thresholds */
function signalLevel(v) {
  if (v >= 75) return "green";
  if (v >= 50) return "yellow";
  return "red";
}
function signalColor(v) {
  if (v >= 75) return "var(--signal-green)";
  if (v >= 50) return "var(--signal-yellow)";
  return "var(--signal-red)";
}
/* Leaflet can't read CSS vars, duplicate the signal palette as hex. */
function signalHex(v) {
  if (v >= 75) return "#4a7c3a";
  if (v >= 50) return "#c89342";
  return "#b7432b";
}

function CheckList({ items, values, onToggle }) {
  // Same pattern as Faces of Power in the power-mapping demo:
  // shorthand label always visible; click the brand-purple "+" to expand the full definition inline.
  const [expanded, setExpanded] = useState(null);
  const toggleExpand = (key, e) => {
    e.stopPropagation();
    setExpanded(prev => prev === key ? null : key);
  };
  return (
    <div className="check-group">
      {items.map(it => {
        const checked = !!values[it.key];
        const isOpen = expanded === it.key;
        const shortLabel = it.short || it.label;
        const fullLabel = it.label;
        return (
          <div key={it.key} className="check-row-wrap">
            <div className={"check-row" + (checked ? " selected" : "")}>
              <div
                className="check-toggle"
                onClick={() => onToggle(it.key)}
                role="checkbox"
                aria-checked={checked}
                tabIndex={0}
                onKeyDown={(e) => { if (e.key === " " || e.key === "Enter") { e.preventDefault(); onToggle(it.key); } }}
              >
                <span className="check-box"></span>
                <span className="check-label">{shortLabel}</span>
              </div>
              {it.short && (
                <button
                  type="button"
                  className={"check-info-btn" + (isOpen ? " open" : "")}
                  onClick={(e) => toggleExpand(it.key, e)}
                  aria-label={isOpen ? "Hide definition" : "Show definition"}
                  title="Show definition"
                >+</button>
              )}
            </div>
            {isOpen && it.short && <div className="check-desc">{fullLabel}</div>}
          </div>
        );
      })}
    </div>
  );
}

/* ========= Scorecard view ========= */

function RadarChart({ rp, rt, cp, size = 180 }) {
  const cx = size / 2, cy = size / 2 + 4;
  const r = (size / 2) - 36;
  const vals = [rp/100, rt/100, cp/100];
  const angles = [-Math.PI/2, -Math.PI/2 + (2*Math.PI/3), -Math.PI/2 + (4*Math.PI/3)];
  const pts = vals.map((v, i) => [
    cx + Math.cos(angles[i]) * r * v,
    cy + Math.sin(angles[i]) * r * v,
  ]);
  const axisPts = angles.map(a => [cx + Math.cos(a) * r, cy + Math.sin(a) * r]);
  const labelPts = angles.map(a => [cx + Math.cos(a) * (r + 18), cy + Math.sin(a) * (r + 18)]);
  /* Single-word labels to prevent clipping */
  const labels = [["Right", "People"], ["Real", "Team"], ["Purpose"]];
  const overallHi = Math.round((rp + rt + cp) / 3);
  const polyFill = signalColor(overallHi);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {/* Rings */}
      {[0.25, 0.5, 0.75, 1].map((rf, i) => (
        <circle key={i} cx={cx} cy={cy} r={r * rf}
                fill="none" stroke="var(--rule)" strokeWidth="0.6" opacity={i === 3 ? 0.9 : 0.4} />
      ))}
      {/* Axes */}
      {axisPts.map(([x, y], i) => (
        <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--rule)" strokeWidth="0.6" />
      ))}
      {/* Filled polygon */}
      <polygon points={pts.map(p => p.join(",")).join(" ")}
               fill={polyFill} fillOpacity="0.22"
               stroke={polyFill} strokeWidth="1.5" />
      {pts.map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r="3.2" fill={polyFill} />
      ))}
      {/* Labels */}
      {labelPts.map(([x, y], i) => (
        <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle"
              style={{fontFamily: "var(--mono)", fontSize: 9, letterSpacing: "0.1em",
                      textTransform: "uppercase", fill: "var(--ink-2)", fontWeight: 500}}>
          {labels[i].map((w, j) => (
            <tspan key={j} x={x} dy={j === 0 ? -((labels[i].length - 1) * 5) : 11}>{w}</tspan>
          ))}
        </text>
      ))}
    </svg>
  );
}

/* GitHub-style contribution grid: 3 rows × 7 cells.
   Each row = a dimension (RP / RT / CP). Filled cells = subscore/100*7.
   Color = signal level. */
function ContribGrid({ rp, rt, cp }) {
  const rows = [
    { lbl: "RP", val: rp },
    { lbl: "RT", val: rt },
    { lbl: "CP", val: cp },
  ];
  return (
    <div className="contrib-rows">
      {rows.map((row, i) => {
        const filled = Math.round((row.val / 100) * 7);
        const level = signalLevel(row.val);
        return (
          <div className="contrib-row" key={i}>
            <span className="contrib-row-num">{row.lbl}</span>
            {[0,1,2,3,4,5,6].map(j => (
              <div key={j}
                   className={"contrib-cell" + (j < filled ? " " + level : " dim")} />
            ))}
            <span className="contrib-row-num">{row.val}</span>
          </div>
        );
      })}
    </div>
  );
}

function ScoreBar({ label, value }) {
  const lvl = signalLevel(value);
  return (
    <div className="score-bar-row">
      <span className="score-bar-lbl">{label}</span>
      <div className="score-bar-track">
        <div className={"score-bar-fill " + lvl} style={{width: value + "%"}}></div>
      </div>
      <span className={"score-bar-num " + lvl}>{value}</span>
    </div>
  );
}

function tagsForTeam(team) {
  const out = [];
  if (team.coreLeaders < 3) out.push({ kind: "flag", text: "< 3 core leaders" });
  if (!team.meetsMonthly) out.push({ kind: "flag", text: "No monthly cadence" });
  if (team.attendancePct < 75 && team.meetsMonthly) out.push({ kind: "flag", text: "Attendance < 75%" });
  if (!team.stableFullCycle) out.push({ kind: "flag", text: "Not stable yet" });
  if (!team.mediumTermPlan) out.push({ kind: "flag", text: "No 3–6 mo plan" });
  if (!team.powerPlay) out.push({ kind: "flag", text: "No power play" });
  if (team.fedRepresented) out.push({ kind: "ok", text: "Fed-represented" });
  return out;
}

function ScorecardView({ teams }) {
  // Default sort by team name so the page opens on alphabetical variation,
  // not a pre-ranked Health Index that hides the spread.
  const [sortKey, setSortKey] = useState("name");
  const sorted = [...teams].sort((a, b) => {
    const sa = scoreTeam(a), sb = scoreTeam(b);
    if (sortKey === "hi") return sb.hi - sa.hi;
    if (sortKey === "rp") return sb.rp - sa.rp;
    if (sortKey === "rt") return sb.rt - sa.rt;
    if (sortKey === "cp") return sb.cp - sa.cp;
    if (sortKey === "name") return a.name.localeCompare(b.name);
    return 0;
  });
  return (
    <div>
      <div className="sortbar">
        <span>Sort by</span>
        <select value={sortKey} onChange={e => setSortKey(e.target.value)}>
          <option value="name">Team name</option>
          <option value="hi">Team Health Index</option>
          <option value="rp">Right People</option>
          <option value="rt">Real Team</option>
          <option value="cp">Compelling Purpose</option>
        </select>
        <span style={{marginLeft: "auto"}}>{teams.length} teams</span>
      </div>
      {teams.length === 0 ? (
        <div className="empty">No teams yet. Add one in the left pane.</div>
      ) : (
        <div className="scorecard-grid">
          {sorted.map(t => {
            const s = scoreTeam(t);
            const tags = tagsForTeam(t);
            return (
              <div className="score-card" key={t.id}>
                <div className="score-card-head">
                  <div style={{flex: 1, minWidth: 0}}>
                    <div className="score-card-title">{t.name}</div>
                    <div className="score-card-meta">{t.constituencyDetail || "·"}</div>
                    <div style={{marginTop: 8, display: "flex", alignItems: "center", gap: 10}}>
                      <span className={"health-index " + signalLevel(s.hi)}>{s.hi}</span>
                      <span className="health-index-lbl">Health Idx</span>
                    </div>
                  </div>
                  <ContribGrid rp={s.rp} rt={s.rt} cp={s.cp} />
                </div>
                <div className="score-radar">
                  <RadarChart rp={s.rp} rt={s.rt} cp={s.cp} />
                </div>
                <div className="score-bars">
                  <ScoreBar label="Right People" value={s.rp} />
                  <ScoreBar label="Real Team" value={s.rt} />
                  <ScoreBar label="Compelling Purpose" value={s.cp} />
                </div>
                {tags.length > 0 && (
                  <div className="score-tags">
                    {tags.map((t, i) => <span key={i} className={"score-tag " + (t.kind === "flag" ? "flag" : "ok")}>{t.text}</span>)}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ========= 2x2 Effectiveness Grid ========= */

function EffectivenessGrid({ teams, onUpdateTeam }) {
  const hostRef = useRef(null);
  const [size, setSize] = useState({ w: 700, h: 600 });
  const [dragId, setDragId] = useState(null);
  const [tip, setTip] = useState(null);

  useEffect(() => {
    if (!hostRef.current) return;
    const ro = new ResizeObserver(([entry]) => {
      const r = entry.contentRect;
      setSize({ w: Math.max(420, r.width - 60), h: Math.max(420, r.height - 60) });
    });
    ro.observe(hostRef.current);
    return () => ro.disconnect();
  }, []);

  const side = Math.min(size.w, size.h);
  const cx = side / 2, cy = side / 2, half = side / 2 - 80;
  const xFor = (v) => cx + v * half;
  const yFor = (v) => cy - v * half;

  const onDotDown = (e, t) => {
    e.preventDefault();
    setDragId(t.id);
  };
  const onMove = useCallback((e) => {
    if (!dragId || !hostRef.current) return;
    const svgEl = hostRef.current.querySelector("svg");
    if (!svgEl) return;
    const rect = svgEl.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    /* Convert screen -> svg coords assuming uniform scaling */
    const scale = svgEl.viewBox.baseVal.width / rect.width;
    const px = sx * scale;
    const py = sy * scale;
    const nx = Math.max(-1, Math.min(1, (px - cx) / half));
    const ny = Math.max(-1, Math.min(1, (cy - py) / half));
    onUpdateTeam(dragId, { gridX: Number(nx.toFixed(2)), gridY: Number(ny.toFixed(2)) });
  }, [dragId, cx, cy, half, onUpdateTeam]);
  const onUp = useCallback(() => setDragId(null), []);

  useEffect(() => {
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
  }, [onMove, onUp]);

  const quadCoords = QUADRANTS.map(q => ({
    ...q,
    sx: xFor(q.sxFrac),
    sy: yFor(q.syFrac),
  }));

  return (
    <div className="grid-stage column" ref={hostRef}>
      <svg className="grid-svg" viewBox={`0 0 ${side} ${side}`} width={side} height={side} style={{maxHeight: "min(72vh, 720px)"}}>
        {/* Axes */}
        <line x1={cx - half} y1={cy} x2={cx + half} y2={cy} stroke="var(--rule)" strokeWidth="1" />
        <line x1={cx} y1={cy - half} x2={cx} y2={cy + half} stroke="var(--rule)" strokeWidth="1" />

        {/* Axis labels, top/bottom horizontal, sides rotated 90° to fit */}
        <text className="grid-axis-label" x={cx} y={cy - half - 22} textAnchor="middle">Strategic (organizing)</text>
        <text className="grid-axis-label" x={cx} y={cy + half + 32} textAnchor="middle">Reactive (mobilizing)</text>
        <text className="grid-axis-label" x={cx - half - 22} y={cy} textAnchor="middle" dominantBaseline="middle"
              transform={`rotate(-90, ${cx - half - 22}, ${cy})`}>Organizer-led</text>
        <text className="grid-axis-label" x={cx + half + 22} y={cy} textAnchor="middle" dominantBaseline="middle"
              transform={`rotate(90, ${cx + half + 22}, ${cy})`}>Leader-distributed</text>

        {/* Quadrant labels render AFTER team dots so pills stay on top, see below. */}

        {/* Team dots */}
        {teams.map(t => {
          const { x, y } = effectiveGridPos(t);
          const ax = xFor(x), ay = yFor(y);
          const s = scoreTeam(t);
          const color = signalColor(s.hi);
          /* Bubble size = members (capped so very large teams don't dwarf the chart) */
          const r = 7 + Math.min(t.members || 0, 30) * 0.7;
          return (
            <g key={t.id}
               className={"grid-dot" + (dragId === t.id ? " dragging" : "")}
               transform={`translate(${ax}, ${ay})`}
               onMouseDown={(e) => onDotDown(e, t)}
               onMouseEnter={(e) => {
                 const rect = hostRef.current.getBoundingClientRect();
                 setTip({ x: e.clientX - rect.left, y: e.clientY - rect.top, team: t, scores: s });
               }}
               onMouseMove={(e) => {
                 if (!tip) return;
                 const rect = hostRef.current.getBoundingClientRect();
                 setTip(t2 => t2 ? { ...t2, x: e.clientX - rect.left, y: e.clientY - rect.top } : t2);
               }}
               onMouseLeave={() => setTip(null)}>
              <circle r={r} fill={color} stroke="rgba(23,21,20,0.4)" strokeWidth="1" opacity="0.92" />
              <text x="0" y={r + 13} textAnchor="middle"
                    className="node-label" style={{fontSize: 10}}>
                {t.name.length > 26 ? t.name.slice(0, 24) + "…" : t.name}
              </text>
            </g>
          );
        })}

        {/* Quadrant strategy pills — rendered LAST so they sit above team dots, never overlapped */}
        {quadCoords.map((q, i) => {
          const text = q.strategy;
          const num = q.num;
          const padX = 10, gap = 6, numW = 12, charW = 6.5;
          const w = numW + gap + text.length * charW + padX * 2;
          const h = 26;
          const rx = q.anchor === "end" ? q.sx - w : q.sx;
          const ry = q.sy - h / 2;
          return (
            <g key={"quad" + i}>
              <rect x={rx} y={ry} width={w} height={h} rx="13" ry="13"
                    fill="rgba(255,255,255,0.97)" stroke="var(--rule)" strokeWidth="1"
                    style={{filter: "drop-shadow(0 1px 2px rgba(0,0,0,0.06))"}} />
              <text x={rx + padX} y={q.sy + 1}
                    dominantBaseline="middle" textAnchor="start"
                    fontFamily="var(--mono)" fontSize="10" fontWeight="600"
                    fill="var(--cobalt)" letterSpacing="0.04em">
                {num}
              </text>
              <text x={rx + padX + numW + gap} y={q.sy + 1}
                    dominantBaseline="middle" textAnchor="start"
                    fontFamily="var(--sans)" fontSize="11.5" fontWeight="500"
                    fill="var(--ink-2)">
                {text}
              </text>
            </g>
          );
        })}
      </svg>

      <div className="grid-legend-bar">
        <div>
          <h4>Quadrants</h4>
          {QUADRANTS.map((q, i) => (
            <div key={i} className="quad-entry">
              <span className="quad-num">{q.num}</span>
              <span className="quad-text"><strong>{q.strategy}</strong>, {q.note}</span>
            </div>
          ))}
        </div>
        <div>
          <h4>Reading the chart</h4>
          <div className="quad-entry" style={{color:"var(--mute)"}}>
            <span>Dot color = Health Index (green / yellow / red). Dot size = members.
            Position auto-seeds from sub-scores. Drag any dot to reposition.</span>
          </div>
        </div>
      </div>

      {tip && tip.team && (
        <div className="map-tooltip" style={{
          left: Math.min(tip.x + 14, size.w - 290),
          top: Math.min(tip.y + 14, size.h - 100)
        }}>
          <div className="tt-name">{tip.team.name}</div>
          <div className="tt-meta">{tip.team.constituencyDetail || "·"}</div>
          <div className="tt-scores">
            Health {tip.scores.hi} · RP {tip.scores.rp} · RT {tip.scores.rt} · CP {tip.scores.cp}
          </div>
        </div>
      )}
    </div>
  );
}

/* Real California map via Leaflet + OpenStreetMap tiles.
   Mirrors the pattern used in the MO results dashboard at
   lizmckenna.github.io/groundwork/pilot/results-5-26-x7k3m9/ */
function GeoMap({ teams }) {
  const mapRef = useRef(null);
  const mapInstance = useRef(null);
  const markerLayer = useRef(null);

  /* Initialize the map once */
  useEffect(() => {
    if (!mapRef.current || mapInstance.current) return;
    const map = L.map(mapRef.current, {
      center: [37.3, -119.5],
      zoom: 6,
      scrollWheelZoom: true,
      zoomSnap: 0.5,
    });
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: "abcd",
      maxZoom: 19,
    }).addTo(map);
    markerLayer.current = L.layerGroup().addTo(map);
    mapInstance.current = map;
  }, []);

  /* Re-render markers whenever teams change */
  useEffect(() => {
    if (!mapInstance.current || !markerLayer.current) return;
    markerLayer.current.clearLayers();
    const located = teams.filter(t => t.lat != null && t.lng != null);
    located.forEach(t => {
      const s = scoreTeam(t);
      const fill = signalHex(s.hi);
      const radius = 8 + Math.min(t.members || 0, 30) * 0.55;
      const marker = L.circleMarker([t.lat, t.lng], {
        radius,
        fillColor: fill,
        color: "#171514",
        weight: 1.2,
        opacity: 1,
        fillOpacity: 0.82,
      });
      marker.bindTooltip(
        '<div class="tt-name">' + t.name + '</div>' +
        '<div class="tt-meta">' + (t.constituencyDetail || "·") + '</div>' +
        '<div class="tt-scores">Health ' + s.hi + ' · ' + (t.members || 0) + ' members · ' + (t.coreLeaders || 0) + ' core leaders</div>',
        { direction: "top", offset: [0, -8] }
      );
      marker.addTo(markerLayer.current);
    });
    /* Auto-fit to located teams (only if there are at least 2) */
    if (located.length >= 2) {
      const bounds = L.latLngBounds(located.map(t => [t.lat, t.lng]));
      mapInstance.current.fitBounds(bounds, { padding: [40, 40], maxZoom: 8 });
    }
  }, [teams]);

  return (
    <div className="grid-stage column">
      <div id="geo-leaflet-map" ref={mapRef}></div>
      <div className="grid-legend-bar">
        <div>
          <h4>Reading the map</h4>
          <div className="quad-entry" style={{color:"var(--mute)"}}>
            <span>Each circle is a team plotted at its constituency's location.
            Color = Health Index (green / yellow / red). Size = members.
            Hover for detail.</span>
          </div>
        </div>
        <div>
          <h4>What it reveals</h4>
          <div className="quad-entry" style={{color:"var(--mute)"}}>
            <span>Where the federation has depth, where it's thin, and whether the
            strongest teams cluster in one region or spread across the state.
            Coverage gaps become visible in a way a list never makes them.</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ========= Federation rollup view ========= */

function RollupView({ teams }) {
  if (teams.length === 0) return <div className="empty">No teams yet, federation roll-up will populate as teams are added.</div>;
  const scored = teams.map(t => ({ t, s: scoreTeam(t), q: teamQuadrant(t) }));
  const effective = scored.filter(x => x.s.hi >= 75);
  const developing = scored.filter(x => x.s.hi >= 50 && x.s.hi < 75);
  const stalled = scored.filter(x => x.s.hi < 50);
  const byQuad = QUADRANTS.map(q => ({
    q,
    teams: scored.filter(x => x.q.num === q.num).map(x => x.t),
  }));

  const avg = (arr, fn) => arr.length === 0 ? 0 : Math.round(arr.reduce((s, x) => s + fn(x), 0) / arr.length);
  const avgRP = avg(scored, x => x.s.rp);
  const avgRT = avg(scored, x => x.s.rt);
  const avgCP = avg(scored, x => x.s.cp);

  const flags = {
    noPlan: scored.filter(x => !x.t.mediumTermPlan).length,
    noPlay: scored.filter(x => !x.t.powerPlay).length,
    underAtt: scored.filter(x => x.t.meetsMonthly && x.t.attendancePct < 75).length,
    underCore: scored.filter(x => x.t.coreLeaders < 3).length,
  };

  return (
    <div>
      <div className="rollup-grid">
        <div className="rollup-card">
          <div className="rollup-num olive">{effective.length}</div>
          <div className="rollup-lbl">Effective teams (Health ≥ 75)</div>
          <div className="rollup-detail">Distributed, real teams with compelling purpose.</div>
        </div>
        <div className="rollup-card">
          <div className="rollup-num amber">{developing.length}</div>
          <div className="rollup-lbl">Developing teams (Health 50–74)</div>
          <div className="rollup-detail">On track but missing one or more conditions.</div>
        </div>
        <div className="rollup-card">
          <div className="rollup-num terracotta">{stalled.length}</div>
          <div className="rollup-lbl">Stalled / pre-team (Health &lt; 50)</div>
          <div className="rollup-detail">Restart, rebuild, or sunset.</div>
        </div>
        <div className="rollup-card">
          <div className="rollup-num">{teams.length}</div>
          <div className="rollup-lbl">Teams scored</div>
          <div className="rollup-detail">Federation snapshot, scored on this session.</div>
        </div>
      </div>

      <div className="quad-table">
        <div className="quad-table-head">Distribution across effectiveness quadrants</div>
        {byQuad.map(({ q, teams }) => (
          <div className="quad-row" key={q.num}>
            <div className="qname">
              <strong style={{fontFamily:"var(--serif)", fontWeight:500}}>{q.num}. {q.strategy}</strong>
              <div style={{fontSize:11.5, color:"var(--mute)", marginTop: 2}}>{q.note}</div>
            </div>
            <div className="qcount">{teams.length}</div>
            <div className="qteams">{teams.map(t => t.name).join(" · ") || <span style={{fontStyle:"italic"}}>None in this quadrant</span>}</div>
          </div>
        ))}
      </div>

      <div className="rollup-grid">
        <div className="rollup-card">
          <div className="rollup-num">{avgRP}</div>
          <div className="rollup-lbl">Avg Right People</div>
        </div>
        <div className="rollup-card">
          <div className="rollup-num">{avgRT}</div>
          <div className="rollup-lbl">Avg Real Team</div>
        </div>
        <div className="rollup-card">
          <div className="rollup-num">{avgCP}</div>
          <div className="rollup-lbl">Avg Compelling Purpose</div>
        </div>
      </div>

      <div className="quad-table">
        <div className="quad-table-head">Federation-wide flags</div>
        <div className="quad-row" style={{gridTemplateColumns: "1fr 60px"}}>
          <div className="qname">Teams without a 3–6 month organizing plan</div>
          <div className="qcount">{flags.noPlan}</div>
        </div>
        <div className="quad-row" style={{gridTemplateColumns: "1fr 60px"}}>
          <div className="qname">Teams without a power play</div>
          <div className="qcount">{flags.noPlay}</div>
        </div>
        <div className="quad-row" style={{gridTemplateColumns: "1fr 60px"}}>
          <div className="qname">Teams meeting monthly but with attendance &lt; 75%</div>
          <div className="qcount">{flags.underAtt}</div>
        </div>
        <div className="quad-row" style={{gridTemplateColumns: "1fr 60px"}}>
          <div className="qname">Teams with fewer than 3 core leaders</div>
          <div className="qcount">{flags.underCore}</div>
        </div>
      </div>
    </div>
  );
}

function GateScreen({ orgKey, onAuth }) {
  const [pw, setPw] = useState("");
  const [error, setError] = useState("");
  const submit = (e) => {
    e.preventDefault();
    if (pw === ORG_GATES[orgKey].password) {
      onAuth(orgKey);
    } else {
      setError("Wrong password. Try again or use the public demo.");
      setPw("");
    }
  };
  return (
    <div className="gate-screen">
      <div className="gate-card">
        <div className="gate-eyebrow">Team Effectiveness Instrument</div>
        <div className="gate-title">Sign in</div>
        <div className="gate-org-pill">{ORG_GATES[orgKey].name}</div>
        <p className="gate-sub">
          This is the private entry for {ORG_GATES[orgKey].name}. Submissions save to the Groundwork backend so they can be reviewed and analyzed over time. If you don't have the password, the public demo (linked below) is open to anyone.
        </p>
        <form onSubmit={submit}>
          <label htmlFor="gate-pw" className="gate-label">Password</label>
          <input
            id="gate-pw"
            type="password"
            className="gate-input"
            value={pw}
            onChange={e => { setPw(e.target.value); setError(""); }}
            placeholder=""
            autoFocus
          />
          {error && <div className="gate-error">{error}</div>}
          <div className="gate-actions">
            <button type="submit" className="btn btn-primary">Continue</button>
            <a href="?" className="gate-link">Use public demo →</a>
          </div>
        </form>
      </div>
    </div>
  );
}

function App() {
  // Detect ?org=pico (etc) once on first render. If present, show GateScreen
  // until the password is correct. Until then, the dashboard is never rendered,
  // so dummy data can never leak behind the gate. Org mode also starts with
  // empty state (no seed teams) since this is a real entry, not a demo.
  const detectedOrg = useMemo(() => detectOrgMode(), []);
  const [orgMode, setOrgMode] = useState(null);
  const today = new Date().toISOString().slice(0, 10);
  const orgInitialFed = (org) => ({
    fedName: ORG_GATES[org].name,
    date: today,
    scorer: "",
    crmConnected: false,
  });

  const [fed, setFed] = useState(detectedOrg ? orgInitialFed(detectedOrg) : SEED_FED);
  const [teams, setTeams] = useState(detectedOrg ? [] : seedTeams());
  /* Only one section open at a time, so the list is always reachable */
  const [openSection, setOpenSection] = useState("list"); // "fed" | "add" | "list"
  const [view, setView] = useState("scorecard");
  const toggleSection = (key) => setOpenSection(s => s === key ? "list" : key);

  // Save-to-Supabase state
  const [saveState, setSaveState] = useState("idle"); // idle | saving | saved | error
  const [saveMsg, setSaveMsg] = useState("");

  const addTeam = useCallback((draft) => {
    setTeams(prev => [...prev, { ...draft, id: "t" + Date.now() + Math.floor(Math.random()*1000) }]);
  }, []);
  const updateTeam = useCallback((id, draft) => {
    setTeams(prev => prev.map(t => t.id === id ? { ...t, ...draft, id } : t));
  }, []);
  const deleteTeam = useCallback((id) => {
    setTeams(prev => prev.filter(t => t.id !== id));
  }, []);

  const reset = () => {
    // In org mode, reset to a clean PICO entry (no dummy teams).
    // In public-demo mode, reset back to the seed data so people can poke around.
    setFed(orgMode ? orgInitialFed(orgMode) : SEED_FED);
    setTeams(orgMode ? [] : seedTeams());
    setOpenSection(orgMode ? "add" : "list");
  };

  const goHome = () => {
    setOpenSection("list");
    setView("scorecard");
  };

  const saveSnapshot = async () => {
    if (!teams.length) {
      setSaveState("error");
      setSaveMsg("Add at least one team before saving.");
      return;
    }
    setSaveState("saving"); setSaveMsg("");
    try {
      await saveResponseToSupabase({
        snapshotDate: fed.date || today,
        filledOutBy: fed.scorer,
        orgName: fed.fedName,
        payload: { fed, teams, exportedAt: new Date().toISOString() },
      });
      setSaveState("saved");
      setSaveMsg("Saved.");
      setTimeout(() => setSaveState("idle"), 3500);
    } catch (e) {
      setSaveState("error");
      setSaveMsg(e.message || "Save failed.");
    }
  };

  const exportJSON = () => {
    const payload = { fed, teams, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `team-effectiveness-${(fed.fedName || "untitled").toLowerCase().replace(/[^a-z0-9]+/g,"-")}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // Gate first: if a private org was requested but not yet authed, show only the gate.
  if (detectedOrg && !orgMode) {
    return <GateScreen orgKey={detectedOrg} onAuth={(org) => {
      setOrgMode(org);
      // Land directly on "Add a team" so Lisa's first action is to enter a real team,
      // not click around the (now empty) scorecard.
      setOpenSection("add");
    }} />;
  }

  return (
    <div className="app">
      <header className="topbar">
        <div className="title-block">
          <h1 className="app-title" onClick={goHome} title="Back to home">
            Team Effectiveness Instrument
          </h1>
          <span className="app-title-sub">
            How healthy is each team right now? Scored periodically.
          </span>
        </div>
        <div style={{display:"flex", alignItems:"center", gap:14}}>
          <label style={{display:"flex", alignItems:"center", gap:6, fontFamily:"var(--sans)", fontSize:12, fontWeight:500, color:"var(--ink-2)", cursor:"pointer"}}>
            <input type="checkbox" checked={fed.crmConnected}
                   onChange={e => setFed({...fed, crmConnected: e.target.checked})}
                   style={{accentColor: "var(--cobalt)"}} />
            CRM connected
          </label>
          {orgMode ? (
            <span className="badge" style={{background:"rgba(92,125,250,0.12)", color:"var(--cobalt)", border:"1px solid var(--cobalt-soft)"}}>
              {ORG_GATES[orgMode].name} · saves to Groundwork
            </span>
          ) : (
            <span className="badge">Demo · data not saved</span>
          )}
          <div className="top-actions" style={{alignItems:"center"}}>
            {orgMode && saveState === "saved" && (
              <span style={{fontFamily:"var(--sans)", fontSize:11.5, color:"#15803d", padding:"4px 10px", background:"#dcfce7", border:"1px solid rgba(34,197,94,0.35)", borderRadius:6}}>
                ✓ {saveMsg}
              </span>
            )}
            {orgMode && saveState === "error" && (
              <span style={{fontFamily:"var(--sans)", fontSize:11.5, color:"#b91c1c", padding:"4px 10px", background:"#fee2e2", border:"1px solid rgba(239,68,68,0.35)", borderRadius:6, maxWidth:280, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}} title={saveMsg}>
                {saveMsg}
              </span>
            )}
            {orgMode && (
              <button
                className="btn btn-primary"
                onClick={saveSnapshot}
                disabled={saveState === "saving"}
                title="Save this snapshot to the Groundwork backend"
              >
                {saveState === "saving" ? "Saving…" : "Save snapshot"}
              </button>
            )}
            <button className="btn btn-ghost" onClick={exportJSON}>Export JSON</button>
            <button className="btn btn-ghost" onClick={reset}>Reset</button>
          </div>
        </div>
      </header>

      <div className="pane-wrap">
        <aside className="left-pane">

          <section className="section">
            <div className="section-header" onClick={() => toggleSection("fed")}>
              <h2>Federation &amp; respondents</h2>
              <span className="caret">{openSection === "fed" ? "−" : "+"}</span>
            </div>
            {openSection === "fed" && (
              <div className="section-body">
                <div style={{marginBottom: 12}}>
                  <button type="button" className="btn btn-ghost" onClick={() => setOpenSection("list")}>← Back to teams</button>
                </div>
                <div className="field">
                  <FieldLabel prov={PROVENANCE.SELF}>Organization name</FieldLabel>
                  <input value={fed.fedName} onChange={e => setFed({...fed, fedName: e.target.value})} />
                </div>
                <div className="field-row">
                  <div className="field">
                    <FieldLabel prov={PROVENANCE.SELF}>Date</FieldLabel>
                    <input type="date" value={fed.date} onChange={e => setFed({...fed, date: e.target.value})} />
                  </div>
                  <div className="field">
                    <FieldLabel prov={PROVENANCE.SELF}>Scorer(s)</FieldLabel>
                    <input value={fed.scorer} onChange={e => setFed({...fed, scorer: e.target.value})} placeholder="Whose judgment is this?" />
                  </div>
                </div>
                <p className="note-line">When the CRM is connected, fields tagged <CrmBadge /> draw directly from the org's records (counts, meeting cadence, attendance). The organizer doesn't grade themselves on countable facts. Everything else is coach / organizer judgment.</p>
              </div>
            )}
          </section>

          <section className="section">
            <div className="section-header" onClick={() => toggleSection("add")}>
              <h2>Add a team</h2>
              <span className="caret">{openSection === "add" ? "−" : "+"}</span>
            </div>
            {openSection === "add" && (
              <div className="section-body">
                <div style={{marginBottom: 12, display: "flex", gap: 8}}>
                  <button type="button" className="btn btn-ghost" onClick={() => setOpenSection("list")}>← Back to teams</button>
                </div>
                <TeamForm onCommit={(d) => { addTeam(d); setOpenSection("list"); }}
                          onCancel={() => setOpenSection("list")}
                          crmConnected={fed.crmConnected} />
              </div>
            )}
          </section>

          <section className="section">
            <div className="section-header" onClick={() => toggleSection("list")}>
              <h2>Teams entered ({teams.length})</h2>
              <span className="caret">{openSection === "list" ? "−" : "+"}</span>
            </div>
            {openSection === "list" && (
              <div className="section-body">
                <div style={{marginBottom: 12, display: "flex", gap: 8}}>
                  <button type="button" className="btn btn-primary" onClick={() => setOpenSection("add")}>+ Add a team</button>
                </div>
                {teams.length === 0 ? (
                  <div className="empty">No teams yet. Add one above to populate the views.</div>
                ) : (
                  <div className="team-list">
                    {teams.map(t => (
                      <TeamCard key={t.id} team={t} onUpdate={updateTeam} onDelete={deleteTeam} crmConnected={fed.crmConnected} />
                    ))}
                  </div>
                )}
              </div>
            )}
          </section>

        </aside>

        <main className="right-pane">
          <div className="tabs">
            <button className={"tab" + (view === "scorecard" ? " active" : "")} onClick={() => setView("scorecard")}>Scorecard</button>
            <button className={"tab" + (view === "grid" ? " active" : "")} onClick={() => setView("grid")}>Effectiveness grid</button>
            <button className={"tab" + (view === "geo" ? " active" : "")} onClick={() => setView("geo")}>Geographic</button>
            <button className={"tab" + (view === "rollup" ? " active" : "")} onClick={() => setView("rollup")}>Federation roll-up</button>
          </div>
          <div className="view-host">
            {view === "scorecard" && <ScorecardView teams={teams} />}
            {view === "grid" && <EffectivenessGrid teams={teams} onUpdateTeam={updateTeam} />}
            {view === "geo" && <GeoMap teams={teams} />}
            {view === "rollup" && <RollupView teams={teams} />}
          </div>
        </main>
      </div>

      <div className="legend-line">
        <span><CrmBadge /> = could be auto-filled from the org's CRM of record (Groundwork, EveryAction, Salsa, Airtable, …). Fields without this tag are coach / organizer judgment.</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
